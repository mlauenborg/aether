<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÆTHER — The Lab</title>
    <meta name="description" content="Experiment with WebGL fragment shaders in the ÆTHER Lab.">
    <meta name="theme-color" content="#030014">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { font-family: 'Inter', sans-serif; background: #030014; color: #e2e8f0; overflow-x: hidden; cursor: none; }
        @media (pointer: coarse) { body { cursor: auto; } }

        /* Scroll Progress */
        #scrollProgress { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4, #f43f5e); z-index: 9999; transition: width 0.1s linear; }

        /* Cursor */
        .cursor-dot, .cursor-ring, .cursor-glow { position: fixed; pointer-events: none; z-index: 10000; border-radius: 50%; transition: opacity 0.3s; }
        .cursor-dot { width: 6px; height: 6px; background: #e2e8f0; transform: translate(-50%, -50%); }
        .cursor-ring { width: 36px; height: 36px; border: 1.5px solid rgba(226,232,240,0.5); transform: translate(-50%, -50%); transition: width 0.25s, height 0.25s, border-color 0.25s; }
        .cursor-ring.hover-link { border-color: rgba(99,102,241,0.9); width: 48px; height: 48px; }
        .cursor-ring.hover-card { border-color: rgba(6,182,212,0.9); width: 48px; height: 48px; }
        .cursor-ring.hover-btn { border-color: rgba(244,63,94,0.9); width: 48px; height: 48px; }
        .cursor-glow { width: 120px; height: 120px; background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%); transform: translate(-50%, -50%); }
        @media (pointer: coarse) { .cursor-dot, .cursor-ring, .cursor-glow, .cursor-particle { display: none; } }

        /* Starfield */
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .nebula { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.18; z-index: 1; animation: nebulaDrift 30s ease-in-out infinite alternate; }
        .nebula:nth-child(1) { width: 600px; height: 600px; background: radial-gradient(circle, #6366f1, transparent 70%); top: 10%; left: -5%; animation-duration: 35s; }
        .nebula:nth-child(2) { width: 500px; height: 500px; background: radial-gradient(circle, #8b5cf6, transparent 70%); top: 50%; right: -10%; animation-duration: 28s; animation-delay: -5s; }
        .nebula:nth-child(3) { width: 450px; height: 450px; background: radial-gradient(circle, #06b6d4, transparent 70%); bottom: 20%; left: 30%; animation-duration: 32s; animation-delay: -10s; }
        .nebula:nth-child(4) { width: 550px; height: 550px; background: radial-gradient(circle, #f43f5e, transparent 70%); top: 30%; left: 50%; animation-duration: 40s; animation-delay: -15s; }
        .nebula:nth-child(5) { width: 400px; height: 400px; background: radial-gradient(circle, #f59e0b, transparent 70%); bottom: 5%; right: 20%; animation-duration: 25s; animation-delay: -8s; }
        @keyframes nebulaDrift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,-30px) scale(1.15); } }
        .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.08; background: radial-gradient(ellipse 80% 50% at 20% 40%, #6366f1, transparent), radial-gradient(ellipse 60% 40% at 70% 60%, #06b6d4, transparent), radial-gradient(ellipse 70% 50% at 50% 20%, #f43f5e, transparent); animation: auroraDrift 20s ease-in-out infinite alternate; }
        @keyframes auroraDrift { 0% { transform: translateX(-20px) translateY(0); opacity: 0.06; } 50% { opacity: 0.1; } 100% { transform: translateX(20px) translateY(-10px); opacity: 0.06; } }
        .film-grain { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 9998; pointer-events: none; opacity: 0.04; animation: grainShift 0.5s steps(4) infinite; }
        @keyframes grainShift { 0% { transform: translate(0,0); } 25% { transform: translate(-2%,-2%); } 50% { transform: translate(2%,2%); } 75% { transform: translate(-1%,1%); } 100% { transform: translate(1%,-1%); } }

        /* Nav */
        .nav { position: fixed; top: 0; left: 0; right: 0; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; background: rgba(3,0,20,0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; transition: transform 0.3s ease; }
        .nav.hidden { transform: translateY(-100%); }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.05em; transition: all 0.3s; display: inline-block; }
        .nav-logo:hover { transform: perspective(200px) rotateY(15deg); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-link { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; position: relative; }
        .nav-link:not(.active)::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%) scale(0); width: 4px; height: 4px; background: #8b5cf6; border-radius: 50%; transition: transform 0.2s; }
        .nav-link:not(.active):hover::after { transform: translateX(-50%) scale(1); }
        .nav-link:hover { color: rgba(255,255,255,0.9); }
        .nav-link.active { color: #fff; }
        .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
        .nav-hamburger span { display: block; width: 22px; height: 1.5px; background: rgba(255,255,255,0.7); transition: all 0.3s; }
        .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .nav-hamburger.open span:nth-child(2) { opacity: 0; }
        .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
        .nav-overlay { position: fixed; inset: 0; background: rgba(3,0,20,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .nav-overlay.open { opacity: 1; pointer-events: all; }
        .nav-overlay-link { font-family: 'Playfair Display', serif; font-size: 2rem; color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s; }
        .nav-overlay-link:hover, .nav-overlay-link.active { color: #fff; }
        @media (max-width: 768px) { .nav-links { display: none; } .nav-hamburger { display: flex; } .nav { padding: 0 1.5rem; } }

        /* Theme Toggle */
        .theme-toggle { background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 10px; color: #fff; cursor: pointer; font-size: 1rem; transition: all 0.3s; margin-right: 0.5rem; flex-shrink: 0; z-index: 1; }
        .theme-toggle:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }

        /* Content */
        .content { position: relative; z-index: 2; }

        /* Page Entry */
        @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
        body { animation: pageIn 0.6s ease forwards; }

        /* Hero */
        .hero { min-height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: calc(64px + 3rem) 2rem 2rem; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 8vw, 6rem); font-weight: 700; background: linear-gradient(135deg, #8b5cf6, #06b6d4, #f43f5e, #8b5cf6); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientCycle 6s ease-in-out infinite; margin-bottom: 0.5rem; }
        @keyframes gradientCycle { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .hero-subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1rem, 2vw, 1.3rem); color: rgba(255,255,255,0.5); font-weight: 400; }

        /* Reveal */
        .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
        .reveal.visible { opacity: 1; transform: none; }

        /* Lab Container */
        .lab-section { padding: 2rem 2rem 6rem; max-width: 1100px; margin: 0 auto; }
        .lab-canvas-wrapper { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); padding: 3px; }
        .lab-canvas-wrapper::before { content: ''; position: absolute; inset: 0; border-radius: 16px; background: conic-gradient(from var(--angle, 0deg), #6366f1, #8b5cf6, #06b6d4, #f43f5e, #f59e0b, #6366f1); z-index: 0; animation: borderSpin 4s linear infinite; }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes borderSpin { to { --angle: 360deg; } }
        .lab-canvas-inner { position: relative; z-index: 1; border-radius: 14px; overflow: hidden; }
        #labCanvas { display: block; width: 100%; height: 400px; background: #000; border-radius: 14px; }
        @media (max-width: 768px) { #labCanvas { height: 250px; } }

        /* Shader Editor */
        .editor-section { margin-top: 1.5rem; }
        .editor-label { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 0.75rem; }
        #shaderCode { width: 100%; height: 280px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #a5f3fc; font-family: 'Courier New', monospace; font-size: 0.8rem; line-height: 1.6; padding: 1rem; resize: vertical; outline: none; transition: border-color 0.2s; }
        #shaderCode:focus { border-color: rgba(99,102,241,0.5); }
        .editor-controls { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
        .btn-compile { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 8px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; padding: 0.6rem 1.5rem; cursor: pointer; transition: all 0.2s; }
        .btn-compile:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.3); }
        .btn-preset { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.7); font-family: 'Inter', sans-serif; font-size: 0.8rem; padding: 0.5rem 1rem; cursor: pointer; transition: all 0.2s; }
        .btn-preset:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.3); }

        /* Error Display */
        #shaderError { display: none; margin-top: 1rem; padding: 1rem; background: rgba(244,63,94,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(244,63,94,0.3); border-radius: 10px; color: #fca5a5; font-family: 'Courier New', monospace; font-size: 0.8rem; white-space: pre-wrap; }

        /* Footer */
        .footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 2rem; text-align: center; color: rgba(255,255,255,0.25); font-size: 0.75rem; letter-spacing: 0.1em; position: relative; z-index: 2; }

        /* ── View Transitions API ── */
        @view-transition { navigation: auto; }
        ::view-transition-old(root) { animation: 0.3s ease-out both fadeOut; }
        ::view-transition-new(root) { animation: 0.3s ease-in both fadeIn; }
        @keyframes fadeOut { to { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } }
    </style>
</head>
<body>

    <div id="scrollProgress"></div>

    <!-- Navigation -->
    <nav class="nav" id="mainNav">
        <a href="index.html" class="nav-logo">ÆTHER</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="contact.html" class="nav-link">Contact</a>
            <a href="lab.html" class="nav-link active">Lab</a>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </nav>
    <div class="nav-overlay" id="navOverlay">
        <a href="index.html" class="nav-overlay-link">Home</a>
        <a href="about.html" class="nav-overlay-link">About</a>
        <a href="gallery.html" class="nav-overlay-link">Gallery</a>
        <a href="contact.html" class="nav-overlay-link">Contact</a>
        <a href="lab.html" class="nav-overlay-link active">Lab</a>
    </div>

    <!-- Cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Background -->
    <canvas id="starfield"></canvas>
    <div class="nebula"></div><div class="nebula"></div><div class="nebula"></div><div class="nebula"></div><div class="nebula"></div>
    <div class="aurora"></div>
    <svg class="film-grain" xmlns="http://www.w3.org/2000/svg"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#grain)"/></svg>

    <div class="content">
        <!-- Hero -->
        <section class="hero">
            <h1 class="hero-title reveal">The Lab</h1>
            <p class="hero-subtitle reveal">Experiment with the fabric of spacetime</p>
        </section>

        <!-- Lab Content -->
        <section class="lab-section">
            <div class="lab-canvas-wrapper reveal">
                <div class="lab-canvas-inner">
                    <canvas id="labCanvas"></canvas>
                </div>
            </div>

            <div class="editor-section reveal">
                <div class="editor-label">Fragment Shader Source — Edit &amp; Compile</div>
                <textarea id="shaderCode" spellcheck="false"></textarea>
                <div id="shaderError"></div>
                <div class="editor-controls">
                    <button class="btn-compile" id="btnCompile">▶ Compile</button>
                    <button class="btn-preset" data-preset="nebula">Nebula</button>
                    <button class="btn-preset" data-preset="plasma">Plasma</button>
                    <button class="btn-preset" data-preset="wormhole">Wormhole</button>
                    <button class="btn-preset" data-preset="matrix">Matrix Rain</button>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>✦ ÆTHER — The Lab ✦</p>
    </footer>

    <script>
        /* ── Scroll Progress ── */
        (function() {
            const bar = document.getElementById('scrollProgress');
            window.addEventListener('scroll', function() {
                const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
                bar.style.width = Math.min(pct, 100) + '%';
            });
        })();

        /* ── Theme Toggle ── */
        (function() {
            const saved = localStorage.getItem('aether-theme') || 'night';
            function applyTheme(t) {
                document.documentElement.setAttribute('data-theme', t);
                const ic = t === 'night' ? '🌙' : '☀️';
                const b = document.getElementById('themeToggle');
                const bm = document.getElementById('themeToggleMobile');
                if (b) b.textContent = ic;
                if (bm) bm.textContent = ic;
                localStorage.setItem('aether-theme', t);
            }
            applyTheme(saved);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.addEventListener('click', function() {
                const cur = document.documentElement.getAttribute('data-theme') || 'night';
                applyTheme(cur === 'night' ? 'day' : 'night');
            });
            const btnM = document.getElementById('themeToggleMobile');
            if (btnM) btnM.addEventListener('click', function() {
                const cur = document.documentElement.getAttribute('data-theme') || 'night';
                applyTheme(cur === 'night' ? 'day' : 'night');
            });
        })();

        /* ── Starfield ── */
        (function() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);
            const stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.2 + 0.2, a: Math.random(), speed: Math.random() * 0.5 + 0.1 });
            }
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    s.a += s.speed * 0.01;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(226,232,240,' + (0.3 + 0.7 * Math.abs(Math.sin(s.a))) + ')';
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        /* ── Cursor ── */
        (function() {
            if (window.matchMedia('(pointer: coarse)').matches) return;
            const dot = document.getElementById('cursorDot');
            const ring = document.getElementById('cursorRing');
            const glow = document.getElementById('cursorGlow');
            let mx = -100, my = -100, rx = -100, ry = -100;
            document.addEventListener('mousemove', function(e) {
                mx = e.clientX; my = e.clientY;
                dot.style.left = mx + 'px'; dot.style.top = my + 'px';
            });
            function follow() {
                rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
                ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
                glow.style.left = rx + 'px'; glow.style.top = ry + 'px';
                requestAnimationFrame(follow);
            }
            follow();
            document.querySelectorAll('a, .nav-link').forEach(el => {
                el.addEventListener('mouseenter', () => ring.classList.add('hover-link'));
                el.addEventListener('mouseleave', () => ring.classList.remove('hover-link', 'hover-card', 'hover-btn'));
            });
            document.querySelectorAll('button.btn-compile, button.btn-preset').forEach(el => {
                el.addEventListener('mouseenter', () => ring.classList.add('hover-btn'));
                el.addEventListener('mouseleave', () => ring.classList.remove('hover-link', 'hover-card', 'hover-btn'));
            });
        })();

        /* ── Nav ── */
        (function() {
            const nav = document.getElementById('mainNav');
            const ham = document.getElementById('navHamburger');
            const ov = document.getElementById('navOverlay');
            let last = 0;
            window.addEventListener('scroll', function() {
                const cur = window.pageYOffset;
                nav.classList.toggle('hidden', cur > last && cur > 80);
                last = cur;
            });
            ham.addEventListener('click', () => { ham.classList.toggle('open'); ov.classList.toggle('open'); });
            ov.querySelectorAll('.nav-overlay-link').forEach(l => l.addEventListener('click', () => { ham.classList.remove('open'); ov.classList.remove('open'); }));
        })();

        /* ── Reveal Observer ── */
        (function() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach((e, i) => { if (e.isIntersecting) { setTimeout(() => e.target.classList.add('visible'), i * 100); obs.unobserve(e.target); } });
            }, { threshold: 0.15 });
            document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        })();

        /* ── Page Transitions ── */
        (function() {
            document.querySelectorAll('a[href]').forEach(function(link) {
                const href = link.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
                link.addEventListener('click', function(e) {
                    if (e.metaKey || e.ctrlKey) return;
                    e.preventDefault();
                    if ('startViewTransition' in document) {
                        document.startViewTransition(() => { window.location.href = href; });
                    } else {
                        document.body.style.transition = 'opacity 0.3s ease';
                        document.body.style.opacity = '0';
                        setTimeout(() => { window.location.href = href; }, 300);
                    }
                });
            });
        })();

        /* ── WebGL Lab Shader ── */
        (function() {
            const PRESETS = {
                nebula: `precision mediump float;
uniform float u_time;
uniform vec2 u_resolution;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
               mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 6; i++) { v += a * noise(p); p *= 2.1; a *= 0.5; }
    return v;
}
void main() {
    vec2 uv = (gl_FragCoord.xy - u_resolution * 0.5) / min(u_resolution.x, u_resolution.y);
    float t = u_time * 0.15;
    vec2 p = uv * 2.5;
    float n1 = fbm(p + vec2(t * 0.3, t * 0.2));
    float n2 = fbm(p * 1.5 - vec2(t * 0.2, t * 0.1) + n1);
    float n3 = fbm(p * 0.8 + vec2(t * 0.1, -t * 0.15) + n2 * 0.5);
    vec3 c1 = vec3(0.388, 0.4, 0.945);
    vec3 c2 = vec3(0.545, 0.361, 0.965);
    vec3 c3 = vec3(0.024, 0.714, 0.831);
    vec3 c4 = vec3(0.957, 0.247, 0.369);
    vec3 col = mix(c1, c2, n1);
    col = mix(col, c3, n2 * 0.7);
    col = mix(col, c4, n3 * 0.4);
    col *= 0.8 + 0.5 * n1;
    float stars = pow(hash(uv * 300.0 + 0.5), 20.0) * 3.0;
    col += stars;
    gl_FragColor = vec4(col, 1.0);
}`,
                plasma: `precision mediump float;
uniform float u_time;
uniform vec2 u_resolution;
void main() {
    vec2 uv = gl_FragCoord.xy / u_resolution;
    float t = u_time * 0.8;
    float v = sin(uv.x * 10.0 + t);
    v += sin(uv.y * 8.0 + t * 1.3);
    v += sin((uv.x + uv.y) * 7.0 + t * 0.7);
    v += sin(sqrt(uv.x * uv.x + uv.y * uv.y) * 12.0 - t * 2.0);
    v *= 0.25;
    vec3 col = vec3(
        0.5 + 0.5 * sin(v * 3.14159 + 0.0),
        0.5 + 0.5 * sin(v * 3.14159 + 2.094),
        0.5 + 0.5 * sin(v * 3.14159 + 4.189)
    );
    gl_FragColor = vec4(col, 1.0);
}`,
                wormhole: `precision mediump float;
uniform float u_time;
uniform vec2 u_resolution;
void main() {
    vec2 uv = (gl_FragCoord.xy - u_resolution * 0.5) / min(u_resolution.x, u_resolution.y);
    float r = length(uv);
    float a = atan(uv.y, uv.x);
    float t = u_time * 0.5;
    float tunnel = 1.0 / (r + 0.05);
    float stripes = sin(tunnel * 5.0 - t * 3.0 + a * 4.0) * 0.5 + 0.5;
    float glow = exp(-r * 3.0);
    vec3 c1 = vec3(0.388, 0.4, 0.945);
    vec3 c2 = vec3(0.024, 0.714, 0.831);
    vec3 col = mix(c1, c2, stripes);
    col *= glow * 2.0;
    col += vec3(0.957, 0.247, 0.369) * exp(-r * 8.0) * 0.5;
    gl_FragColor = vec4(col, 1.0);
}`,
                matrix: `precision mediump float;
uniform float u_time;
uniform vec2 u_resolution;
float hash(float n) { return fract(sin(n) * 43758.5453); }
void main() {
    vec2 uv = gl_FragCoord.xy / u_resolution;
    float col_id = floor(uv.x * 40.0);
    float speed = hash(col_id) * 2.0 + 0.5;
    float offset = hash(col_id + 100.0) * 10.0;
    float y = fract(uv.y - u_time * speed * 0.3 + offset);
    float char_id = hash(col_id + floor((uv.y - u_time * speed * 0.3 + offset) * 20.0));
    float bright = (1.0 - y) * (1.0 - y);
    float on = step(0.5, hash(col_id * 1000.0 + floor(u_time * 5.0)));
    vec3 green = vec3(0.0, 1.0, 0.2);
    vec3 col = green * bright * on * 1.5;
    col += vec3(0.0, 0.3, 0.1) * on * 0.3;
    gl_FragColor = vec4(col, 1.0);
}`
            };

            const canvas = document.getElementById('labCanvas');
            const textarea = document.getElementById('shaderCode');
            const errorDiv = document.getElementById('shaderError');
            const btnCompile = document.getElementById('btnCompile');

            // Resize canvas
            function resizeCanvas() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
            }

            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) {
                canvas.style.display = 'flex';
                canvas.style.alignItems = 'center';
                canvas.style.justifyContent = 'center';
                const fallback = document.createElement('div');
                fallback.style.cssText = 'color:rgba(255,255,255,0.5);text-align:center;padding:2rem;';
                fallback.textContent = 'WebGL not supported in this browser.';
                canvas.parentElement.replaceChildren(fallback);
                return;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const vertSrc = `attribute vec2 a_position; void main() { gl_Position = vec4(a_position, 0.0, 1.0); }`;
            let program = null;
            let startTime = Date.now();
            let animId = null;

            function createShader(type, src) {
                const sh = gl.createShader(type);
                gl.shaderSource(sh, src);
                gl.compileShader(sh);
                if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
                    const err = gl.getShaderInfoLog(sh);
                    gl.deleteShader(sh);
                    throw err;
                }
                return sh;
            }

            function compile(fragSrc) {
                try {
                    const vert = createShader(gl.VERTEX_SHADER, vertSrc);
                    const frag = createShader(gl.FRAGMENT_SHADER, fragSrc);
                    const prog = gl.createProgram();
                    gl.attachShader(prog, vert);
                    gl.attachShader(prog, frag);
                    gl.linkProgram(prog);
                    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw gl.getProgramInfoLog(prog);
                    if (program) gl.deleteProgram(program);
                    program = prog;
                    errorDiv.style.display = 'none';
                    errorDiv.textContent = '';
                    startTime = Date.now();

                    const buf = gl.createBuffer();
                    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
                    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
                    const loc = gl.getAttribLocation(program, 'a_position');
                    gl.enableVertexAttribArray(loc);
                    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
                } catch(e) {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = '⚠ Shader compilation error:\n' + e;
                }
            }

            function render() {
                animId = requestAnimationFrame(render);
                if (!program) return;
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.useProgram(program);
                const tLoc = gl.getUniformLocation(program, 'u_time');
                const rLoc = gl.getUniformLocation(program, 'u_resolution');
                if (tLoc) gl.uniform1f(tLoc, (Date.now() - startTime) / 1000.0);
                if (rLoc) gl.uniform2f(rLoc, canvas.width, canvas.height);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            }

            function loadPreset(name) {
                textarea.value = PRESETS[name] || PRESETS.nebula;
                compile(textarea.value);
            }

            // Default: nebula
            loadPreset('nebula');
            render();

            btnCompile.addEventListener('click', () => compile(textarea.value));
            document.querySelectorAll('.btn-preset').forEach(btn => {
                btn.addEventListener('click', () => loadPreset(btn.dataset.preset));
            });
        })();

        /* ── PWA ── */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        /* ── Parallax Scroll (Nebula + Aurora) ── */
        (function() {
            var nebulas = document.querySelectorAll('.nebula');
            var aurora = document.querySelector('.aurora');
            var speeds = [0.03, 0.05, 0.07, 0.08, 0.1];
            var ticking = false;
            var lastScrollY = 0;
            window.addEventListener('scroll', function() {
                lastScrollY = window.pageYOffset;
                    requestAnimationFrame(function() {
                        nebulas.forEach(function(nebula, i) {
                            nebula.style.marginTop = -(lastScrollY * (speeds[i] || 0.05)) + 'px';
                        });
                        if (aurora) aurora.style.marginTop = -(lastScrollY * 0.04) + 'px';
                        ticking = false;
                    });
                    ticking = true;
                }
            }, { passive: true });
        })();
    </script>
</body>
</html>
